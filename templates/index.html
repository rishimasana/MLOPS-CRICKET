<!DOCTYPE html>
<html>

<head>

    <title>Cricket Score Predictor</title>

    <style>

        body {

            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 40px;
        }

        .container {

            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {

            width: 90%;
            padding: 10px;
            margin: 8px;
        }

        button {

            background-color: blue;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }

        button:hover {

            background-color: darkblue;
        }

        h1 {

            color: #333;
        }

        .prediction {

            margin-top: 20px;
            font-size: 24px;
            color: green;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Cricket Score Predictor</h1>

        <form action="/predict" method="POST">

            <input type="number" name="Match ID" placeholder="Match ID" required>

            <input type="number" name="Overs Played" placeholder="Overs Played" required>

            <input type="number" name="Wickets Lost" placeholder="Wickets Lost" required>

            <input type="number" step="0.1" name="Run Rate" placeholder="Run Rate" required>

            <input type="number" name="Home/Away" placeholder="Home/Away" required>

            <input type="number" name="Opponent Strength" placeholder="Opponent Strength" required>

            <input type="number" name="Pitch Condition" placeholder="Pitch Condition" required>

            <input type="number" name="Weather" placeholder="Weather" required>

            <button type="submit">Predict Score</button>

        </form>

        {% if prediction %}

        <div class="prediction">

            Predicted Score: {{ prediction }}

        </div>

        {% endif %}

    </div>

</body>

</html>
